name: Package CLI

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: windows-latest
            target: windows-x64
          - os: macos-latest
            target: macos-arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install packaging dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[full,dev]"
          python -m pip install pyinstaller

      - name: Build standalone CLI
        run: |
          python scripts/build_cli_bundle.py --target ${{ matrix.target }}

      - name: Smoke test bundled binary
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            dist/${{ matrix.target }}/csw.exe --help
          else
            dist/${{ matrix.target }}/csw --help
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: csw-${{ matrix.target }}
          path: dist/${{ matrix.target }}
