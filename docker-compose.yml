services:
  claude-session-watcher:
    image: piefkepaul/claude-session-watcher:beta
    restart: unless-stopped
    ports:
      - "127.0.0.1:47831:47831"
      - "127.0.0.1:47832:6080"
    environment:
      CSW_HOST: 0.0.0.0
      CSW_PORT: 47831
      CSW_DATA_DIR: /data
      CSW_CAMOUFOX_HEADLESS: "false"
      CSW_BROWSER_CONSOLE_PUBLIC_PORT: 47832
      CSW_ENABLE_VNC: "true"
      CSW_VNC_PORT: 6080
      CSW_LOCAL_PORT_BIND_ONLY: "true"
    volumes:
      - csw-data:/data

volumes:
  csw-data:
