services:
  claude-session-watcher:
    image: piefkepaul/claude-session-watcher:beta
    restart: unless-stopped
    ports:
      - "127.0.0.1:47831:47831"
    environment:
      CSW_HOST: 0.0.0.0
      CSW_PORT: 47831
      CSW_DATA_DIR: /data
      CSW_CAMOUFOX_HEADLESS: virtual
      CSW_LOCAL_PORT_BIND_ONLY: "true"
    volumes:
      - csw-data:/data

volumes:
  csw-data:
